[package]
name = "blockchain"
version = "0.1.0"
edition = "2021"
description = "Tương tác với các blockchain và quản lý DMD token"
authors = ["Diamond Chain Team"]

[dependencies]
ethers = { version = "2.0", features = ["ws", "rustls"] }
tokio = { version = "1.28", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
once_cell = "1.17"
reqwest = { version = "0.11", features = ["json"] }
rand = "0.8"
log = "0.4"
hex = "0.4"

# Crypto libraries
sha2 = "0.10"
base64 = "0.13"
hmac = "0.12"
aes-gcm = "0.10"

# NEAR libraries
near-sdk = { version = "4.1", optional = true }
near-crypto = { version = "0.16", optional = true }
near-primitives = { version = "0.16", optional = true }
near-jsonrpc-client = { version = "0.5", optional = true }

# Solana libraries
solana-sdk = { version = "1.14", optional = true }
solana-client = { version = "1.14", optional = true }
spl-token = { version = "3.5", optional = true }

[features]
default = []
near_sdk = ["near-sdk", "near-crypto", "near-primitives", "near-jsonrpc-client"]
solana_sdk = ["solana-sdk", "solana-client", "spl-token"]

[dev-dependencies]
mockall = "0.11"
tokio-test = "0.4"
