<!-- extension/popup.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Snipebot Wallet</title>
    <style>
        body { font-family: Arial, sans-serif; width: 300px; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .menu { position: relative; }
        .menu-content { display: none; position: absolute; background-color: #f9f9f9; min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; }
        .menu-content a { color: black; padding: 12px 16px; text-decoration: none; display: block; }
        .menu-content a:hover { background-color: #f1f1f1; }
        .menu:hover .menu-content { display: block; }
        .tab-bar { display: flex; justify-content: center; position: fixed; bottom: 0; width: 100%; background-color: #f1f1f1; }
        .tab-bar a { padding: 10px; text-decoration: none; color: black; }
    </style>
</head>
<body>
    <div class="header">
        <div class="menu">
            <button>Menu</button>
            <div class="menu-content">
                <a href="#" data-page="home">Home</a>
                <a href="#" data-page="exchange">Exchange</a>
                <a href="#" data-page="snipebot">Snipebot</a>
                <a href="#" data-page="stake">Stake</a>
                <a href="#" data-page="mission">Mission</a>
            </div>
        </div>
        <div>
            <span id="balance">0 ETH</span>
            <button id="connect">Connect</button>
        </div>
    </div>
    <div id="content">
        <h1>Wallet</h1>
        <p>Balance: <span id="wallet-balance">0 ETH</span></p>
        <h2>Transaction History</h2>
        <div id="history"></div>
    </div>
    <div class="tab-bar">
        <a href="#" data-page="home">Home</a>
        <a href="#" data-page="exchange">Exchange</a>
        <a href="#" data-page="snipebot">Snipebot</a>
        <a href="#" data-page="stake">Stake</a>
        <a href="#" data-page="mission">Mission</a>
    </div>
    <script src="popup.js"></script>
</body>
</html>
